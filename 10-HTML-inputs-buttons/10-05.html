<!doctype html>
<html>

<head>
    <!-- Main subject: 01 -->

    <title>Value Example</title>
    <link rel="stylesheet" href="11-07.css" />
</head>

<body>
    <h1>Registration Form</h1>
    <p>Please fill your details:</p>
    <label for="name-input">Your Name:</label>
    <input type="text" id="name-input" placeholder="write your full name" />
    <br />
    <label for="age-input">Your age:</label>
    <input type="number" id="age-input" value="30" />
    <br />
    <label for="birth-date-input">Birth Date:</label>
    <input type="date" id="birth-date-input" value="" />
    <br />
    <br />
    <p>Recieve updates vai:</p>
    <input type="radio" id="email-method" />
    <label for="email-method">Email</label><br />
    <input type="radio" id="sms-method" />
    <label for="sms-method">SMS messages</label>
    <input type="radio" id="both-method" />
    <label for="both-method">Email and SMS messages</label>
</body>

</html>
