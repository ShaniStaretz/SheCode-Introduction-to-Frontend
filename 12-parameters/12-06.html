<!doctype html>
<html>

<head>
  <!-- Main subject: 01 -->

  <title>Value Example</title>
</head>

<body>
  <h1>Create a new meeting</h1>
  <label for="meeting-name">Meeting name:</label>
  <input type="text" id="meeting-name" placeholder="write themeeting name" />
  <br /><br />
  <label for="meeting-description">Meeting description:</label>
  <textarea id="meeting-description" rows="3" placeholder="write the meeting description"></textarea>
  <br /><br />
  <label for="meeting-type">Type of event:</label>
  <select id="meeting-type">
    <option value="professional">Professional</option>
    <option value="casual">Casual</option>
    <option value="academic">Academic</option>
  </select>
  <br /><br />
  <label for="meeting-start-time">Start time:</label>
  <input type="datetime-local" id="meeting-start-time" />
  <br /><br />
  <label for="meeting-end-time">End time:</label>
  <input type="datetime-local" id="meeting-end-time" />
  <br /><br />
  <button onclick="onSubmitButtonClick()">Add Event</button>
  <script src="12-06.js"></script>
</body>

</html>
