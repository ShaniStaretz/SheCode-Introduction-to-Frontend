<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <!-- Main subject: 2 IDE working with AI -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Orb</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .orb {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #7c3aed;
            box-shadow: 0 0 45px #7c3aed;
            transition: background 0.4s ease, box-shadow 0.4s ease, transform 0.25s ease;
        }

        .orb.pulse {
            transform: scale(1.06);
        }

        button {
            width: 190px;
            height: 52px;
            border: none;
            border-radius: 8px;
            background: #fff;
            color: #000;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: #e5e5e5;
            transform: translateY(-2px);
        }

        .message {
            min-height: 28px;
            max-width: 420px;
            font-size: 20px;
            line-height: 1.4;
            color: #f5f5f5;
            transition: opacity 0.25s ease;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Mood Orb</h1>

        <div class="orb" id="orb"></div>

        <button id="changeButton">שנה מצב רוח</button>

        <p class="message" id="message">היום הוא יום רגיל לחלוטין.</p>
    </main>

    <script>
        const orb = document.getElementById("orb");
        const button = document.getElementById("changeButton");
        const message = document.getElementById("message");

        const moods = [
            {
                color: "#7c3aed",
                text: "היום הוא יום רגיל לחלוטין."
            },
            {
                color: "#22c55e",
                text: "משהו קטן וטוב עומד לקרות."
            },
            {
                color: "#f97316",
                text: "העיגול החליט שהוא דרמטי היום."
            },
            {
                color: "#38bdf8",
                text: "אין סיבה מיוחדת, אבל זה נראה נחמד."
            },
            {
                color: "#ef4444",
                text: "לחיצה אחת יותר מדי, ועדיין הכול בסדר."
            },
            {
                color: "#facc15",
                text: "האורב במצב אופטימי באופן חשוד."
            }
        ];

        let currentMoodIndex = 0;

        button.addEventListener("click", () => {
            currentMoodIndex = (currentMoodIndex + 1) % moods.length;
            const currentMood = moods[currentMoodIndex];

            orb.style.background = currentMood.color;
            orb.style.boxShadow = `0 0 45px ${currentMood.color}`;

            message.style.opacity = 0;

            setTimeout(() => {
                message.textContent = currentMood.text;
                message.style.opacity = 1;
            }, 180);

            orb.classList.add("pulse");

            setTimeout(() => {
                orb.classList.remove("pulse");
            }, 250);
        });
    </script>
</body>

</html>
