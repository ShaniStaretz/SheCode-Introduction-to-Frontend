<!doctype html>
<html lang="en">
  <head>
    <!-- Main subject: css div Box Model -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="06-02.css" />
    <title>Fun with Flags</title>
  </head>
  <body>
    Flag of Bulgaria:
    <div class="flag">
      <div class="stripe-length white-stripe"></div>
      <div class="stripe-length green-stripe"></div>
      <div class="stripe-length red-stripe"></div>
    </div>
    <br />
    Flag of Germany:
    <div class="flag">
      <div class="stripe-length" id="black-stripe"></div>
      <div class="stripe-length red-stripe"></div>
      <div class="stripe-length" id="yellow-stripe"></div>
    </div>
    <br />
    Flag of Hungary:
    <div class="flag">
      <div class="stripe-length red-stripe"></div>
      <div class="stripe-length white-stripe"></div>
      <div class="stripe-length green-stripe"></div>
    </div>
  </body>
</html>
