<!DOCTYPE html>
<html>

<head>
    <title>Math Quiz Game</title>
    <link rel="stylesheet" href="question11.css">
</head>

<body>
    <h1>Math Quiz Game</h1>


    <div>

        <label for="first-name">First Name:</label>

        <input id="first-name" type="text" />

        <label for="last-name">Last Name:</label>

        <input id="last-name" type="text" />

    </div>


    <div>

        <label for="square-number">Enter a number to square:</label>

        <input id= "square-number" type="number" />

        <button onclick="onSquareClick()">Square</button>

    </div>


    <div>

        <label>Enter three numbers to calculate the average:</label>

        <input id="average-number1" type="number" />

        <input id="average-number2" type="number" />

        <input id="average-number3" type="number" />

        <button onclick="onAverageClick()">Average</button>

    </div>


    <div>

        <button onclick="onSubmitClick()">Submit</button>

    </div>


    <script src="question11.js"></script>
</body>

</html>
