<!DOCTYPE html>
<html>

<head>
    <title>Math game</title>
    <link rel="stylesheet" href="question10.css">
</head>

<body>
    <div>

        <h1>Math Game</h1>

        <div>

            <label for="firstName">First Name</label>

            <input type="text" id="firstName" />

            <label for="lastName">Last Name</label>

            <input type="text" id="lastName" />

        </div>

        <div>

            <label for="doubleNumber">Multiplication by two:</label>

            <input type="number" id="doubleNumber" />

            <button onclick="onMultiTwoClick()">Double</button>

        </div>

        <div>

            <label for="sum">Sum of three numbers:</label>

            <input type="number" id="sum-number1" />

            <input type="number" id="sum-number2" />

            <input type="number" id="sum-number3" />

            <button onclick="onSumThreeNumbersClick()">Sum</button>
        </div>

        <div>

            <button onclick="onSubmitClick()">Submit</button>

        </div>

    </div>
    <script src="question10.js"></script>
</body>

</html>
